name: Fetch Live World Cup Data

on:
  schedule:
    - cron: '*/5 * * * *' # Automatically runs every single hour
  workflow_dispatch: # Allows you to manually trigger it with a button click on GitHub

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Fetch API Data and Save as File
        run: |
          curl -H "X-Auth-Token: ${{ secrets.FOOTBALL_DATA_TOKEN }}" \
          "https://api.football-data.org/v4/competitions/WC/matches" > data.json

      - name: Commit and Push Updated Data
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add data.json
          git commit -m "Automated live score sync" || exit 0
          git push
