<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIFA World Cup 2026 Dashboard</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #0f172a;
            color: #ffffff;
            margin: 0;
            padding: 0;
        }
        header {
            background-color: #1e293b;
            padding: 20px;
            border-bottom: 2px solid #22d3ee;
        }
        header h1 {
            margin: 0;
            color: #22d3ee;
            font-size: 24px;
        }
        .container {
            display: flex;
            gap: 20px;
            padding: 20px;
            overflow-x: auto;
            white-space: nowrap;
            align-items: flex-start;
        }
        .card {
            background-color: #ffffff;
            color: #0f172a;
            border-radius: 4px;
            width: 280px;
            flex-shrink: 0;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            overflow: hidden;
            display: inline-block;
            vertical-align: top;
        }
        .group-header {
            background-color: #00f0ff;
            text-align: center;
            font-weight: bold;
            padding: 10px;
            font-size: 16px;
            text-transform: uppercase;
        }
        .fixtures {
            padding: 10px;
        }
        .match-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 13px;
        }
        .match-time {
            color: #64748b;
            font-size: 11px;
            width: 65px;
        }
        .team {
            font-weight: bold;
            width: 40px;
        }
        .team.away { text-align: right; }
        .score {
            background-color: #e2e8f0;
            font-family: monospace;
            font-weight: bold;
            padding: 2px 6px;
            border: 1px solid #cbd5e1;
            border-radius: 3px;
            width: 45px;
            text-align: center;
        }
        .score.final { background-color: #f1f5f9; }
        .divider {
            border-top: 1px solid #cbd5e1;
            margin: 10px;
        }
        .standings {
            padding: 0 10px 10px 10px;
        }
        .standings-title {
            font-size: 11px;
            color: #94a3b8;
            margin-bottom: 5px;
        }
        .standings-row {
            display: flex;
            justify-content: space-between;
            background-color: #ccfbf1;
            padding: 4px 8px;
            margin-bottom: 4px;
            border-radius: 2px;
            font-size: 12px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <header>
        <h1>Group Stage Scores & Fixtures</h1>
    </header>

    <div class="container" id="dashboard-container">
        </div>

    <script src="script.js"></script>
</body>
</html>
